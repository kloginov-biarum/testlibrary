<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TestLibrary — My Books</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <nav class="navbar">
    <a href="catalog.html" class="navbar-brand">
      <span class="logo-icon">📚</span> TestLibrary
    </a>
    <div class="navbar-nav">
      <a href="catalog.html" id="nav-catalog-link">Catalog</a>
      <a href="my-books.html" class="active" id="nav-mybooks-link">My Books</a>
      <a href="admin.html" id="nav-admin-link" style="display:none">Admin</a>
    </div>
    <div class="navbar-end">
      <span class="navbar-user">Logged in as <strong id="nav-username"></strong></span>
      <button class="btn btn-outline btn-sm" id="logout-btn">Logout</button>
    </div>
  </nav>

  <main class="container">
    <div class="page-header">
      <h1 class="page-title">My Books</h1>
      <p class="page-subtitle">Currently borrowed books</p>
    </div>

    <div id="action-alert" class="alert alert-error" style="margin-bottom:16px"></div>

    <div id="loading-state" class="loading-state">
      <div class="spinner spinner-lg"></div>
      <span>Loading your loans…</span>
    </div>

    <div id="empty-state" class="empty-state" style="display:none">
      <div class="empty-icon">📭</div>
      <div class="empty-title">No books borrowed</div>
      <div class="empty-desc">Go to the <a href="catalog.html">catalog</a> to borrow books</div>
    </div>

    <div id="loans-list" class="loans-list" style="display:none"></div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/my-books.js"></script>
</body>
</html>
