<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TestLibrary — Login</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <div class="logo-icon">📚</div>
        <h1>TestLibrary</h1>
        <p>QA Practice Application</p>
      </div>

      <form class="login-form" id="login-form" novalidate>
        <div id="error-message" class="alert alert-error" role="alert"></div>

        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <input
            class="form-control"
            type="text"
            id="username"
            name="username"
            autocomplete="username"
            placeholder="Enter username"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input
            class="form-control"
            type="password"
            id="password"
            name="password"
            autocomplete="current-password"
            placeholder="Enter password"
            required
          />
        </div>

        <button type="submit" class="btn btn-primary btn-lg btn-full" id="login-btn">
          Login
        </button>
      </form>

      <div class="login-hint">
        <strong>Test credentials (password for all: <code>secret_sauce</code>)</strong>
        <table>
          <tr><td><code>standard_user</code></td><td>Normal behavior</td></tr>
          <tr><td><code>locked_out_user</code></td><td>Cannot log in</td></tr>
          <tr><td><code>problem_user</code></td><td>UI has bugs</td></tr>
          <tr><td><code>performance_glitch_user</code></td><td>Slow responses</td></tr>
          <tr><td><code>admin_user</code></td><td>Admin access</td></tr>
        </table>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // If already logged in — skip to catalog
    if (getToken()) {
      window.location.href = 'catalog.html';
    }

    const form = document.getElementById('login-form');
    const errorMsg = document.getElementById('error-message');
    const loginBtn = document.getElementById('login-btn');

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('visible');
    }

    function hideError() {
      errorMsg.classList.remove('visible');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        showError('Please enter username and password.');
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = 'Logging in…';

      try {
        const data = await apiFetch('/auth/login', {
          method: 'POST',
          body: JSON.stringify({ username, password }),
        });

        saveUser(data);

        if (data.user_type === 'admin_user') {
          window.location.href = 'admin.html';
        } else {
          window.location.href = 'catalog.html';
        }
      } catch (err) {
        showError(err.message);
        loginBtn.disabled = false;
        loginBtn.textContent = 'Login';
      }
    });
  </script>
</body>
</html>
